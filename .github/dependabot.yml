version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 15

  # Maintain dependencies for jewellery-erp
  - package-ecosystem: "npm"
    directory: "/jewellery-erp"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 15
