name: CI Pipeline

on:
  push:
    branches: [ main, implement/phase-1 ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Lint, Typecheck and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: jewellery_erp_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-refresh 3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm Store Directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm Modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Test Environment Variables
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/jewellery_erp_test" >> $GITHUB_ENV
          echo "DIRECT_URL=postgresql://test_user:test_password@localhost:5432/jewellery_erp_test" >> $GITHUB_ENV
          echo "NEON_AUTH_BASE_URL=http://localhost:3000" >> $GITHUB_ENV
          echo "VITE_NEON_AUTH_URL=https://dummy-auth-url.neon.tech/auth" >> $GITHUB_ENV
          echo "NEON_AUTH_COOKIE_SECRET=github-actions-ci-secret-32-chars-long" >> $GITHUB_ENV

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Database Migrations
        run: pnpm prisma migrate deploy

      - name: Seed Database
        run: pnpm prisma db seed

      - name: Run Linter
        run: pnpm run lint

      - name: Run TypeScript Compiler Check
        run: pnpm tsc --noEmit

      - name: Run Tests
        run: pnpm test
